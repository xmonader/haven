name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Haven uses flock(2) for the working-copy lock, so it targets Unix.
        # Windows is intentionally not in the matrix (documented limitation).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: make build
      - name: version smoke test
        run: ./hv version
      - name: test (race, uncached)
        run: go test -race -count=1 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  fuzz-smoke:
    name: fuzz smoke (parsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: short fuzz of object parsers
        run: |
          # One -fuzz target per invocation (Go requires an exact match).
          grep -rn '^func Fuzz' --include='*_test.go' internal | while IFS= read -r line; do
            file=${line%%:*}; pkg=./$(dirname "$file")
            fn=$(echo "$line" | sed -E 's/.*func (Fuzz[A-Za-z0-9_]+).*/\1/')
            echo "fuzzing $fn in $pkg"
            go test "$pkg" -run '^$' -fuzz "^${fn}$" -fuzztime 20s || exit 1
          done
